<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 196" width="400" height="196">
  <!-- Nonlinear system box -->
  <rect x="10" y="30" width="120" height="50" rx="6" fill="#c0392b"/>
  <text x="70" y="50" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">Nonlinear</text>
  <text x="70" y="66" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">system</text>

  <!-- Arrow -->
  <line x1="130" y1="55" x2="155" y2="55" stroke="#182f4c" stroke-width="2"/>
  <polygon points="159,55 153,51 153,59" fill="#182f4c"/>
  <text x="145" y="48" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">lift</text>

  <!-- Koopman box -->
  <rect x="160" y="30" width="120" height="50" rx="6" fill="#e67e22"/>
  <text x="220" y="50" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">Koopman</text>
  <text x="220" y="66" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">linear model</text>

  <!-- Arrow -->
  <line x1="280" y1="55" x2="305" y2="55" stroke="#182f4c" stroke-width="2"/>
  <polygon points="309,55 303,51 303,59" fill="#182f4c"/>
  <text x="295" y="48" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">LQR</text>

  <!-- Control box -->
  <rect x="310" y="30" width="80" height="50" rx="6" fill="#27ae60"/>
  <text x="350" y="50" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">Optimal</text>
  <text x="350" y="66" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">control</text>

  <!-- Cloth illustration -->
  <g transform="translate(130, 100)">
    <!-- Simple cloth mesh -->
    <line x1="0" y1="0" x2="140" y2="0" stroke="#c0392b" stroke-width="2"/>
    <!-- Vertical lines -->
    <line x1="0" y1="0" x2="10" y2="70" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="0" x2="27" y2="72" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="0" x2="44" y2="75" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <line x1="60" y1="0" x2="62" y2="78" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="0" x2="80" y2="78" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="0" x2="98" y2="75" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <line x1="120" y1="0" x2="115" y2="72" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <line x1="140" y1="0" x2="132" y2="70" stroke="#39a17f" stroke-width="1" opacity="0.6"/>
    <!-- Horizontal lines -->
    <line x1="3" y1="23" x2="137" y2="23" stroke="#39a17f" stroke-width="1" opacity="0.4"/>
    <line x1="6" y1="46" x2="135" y2="46" stroke="#39a17f" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="70" x2="132" y2="70" stroke="#39a17f" stroke-width="1" opacity="0.4"/>
    <!-- Corner dots -->
    <circle cx="0" cy="0" r="5" fill="#c0392b"/>
    <circle cx="140" cy="0" r="5" fill="#c0392b"/>
  </g>

  <!-- Label -->
  <text x="200" y="190" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">Koopman-LQR cloth manipulation</text>
</svg>
