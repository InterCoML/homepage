<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 196" width="400" height="196">
  <!-- ML-ROM -->
  <rect x="100" y="10" width="200" height="40" rx="6" fill="#27ae60"/>
  <text x="200" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">ML-ROM</text>

  <!-- Arrow down + labels -->
  <line x1="170" y1="50" x2="170" y2="70" stroke="#182f4c" stroke-width="2"/>
  <polygon points="170,74 166,68 174,68" fill="#182f4c"/>
  <text x="158" y="65" text-anchor="end" fill="#c0392b" font-family="sans-serif" font-size="9">▼ fallback</text>
  <line x1="230" y1="70" x2="230" y2="50" stroke="#182f4c" stroke-width="2"/>
  <polygon points="230,46 226,52 234,52" fill="#182f4c"/>
  <text x="242" y="65" text-anchor="start" fill="#39a17f" font-family="sans-serif" font-size="9">train ▲</text>

  <!-- RB-ROM -->
  <rect x="100" y="78" width="200" height="40" rx="6" fill="#e67e22"/>
  <text x="200" y="103" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">RB-ROM</text>

  <!-- Arrow down + labels -->
  <line x1="170" y1="118" x2="170" y2="138" stroke="#182f4c" stroke-width="2"/>
  <polygon points="170,142 166,136 174,136" fill="#182f4c"/>
  <text x="158" y="133" text-anchor="end" fill="#c0392b" font-family="sans-serif" font-size="9">▼ fallback</text>
  <line x1="230" y1="138" x2="230" y2="118" stroke="#182f4c" stroke-width="2"/>
  <polygon points="230,114 226,120 234,120" fill="#182f4c"/>
  <text x="242" y="133" text-anchor="start" fill="#39a17f" font-family="sans-serif" font-size="9">enrich ▲</text>

  <!-- FOM -->
  <rect x="100" y="146" width="200" height="40" rx="6" fill="#c0392b"/>
  <text x="200" y="171" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">FOM</text>

  <!-- Labels on the right -->
  <text x="310" y="35" text-anchor="start" fill="#666" font-family="sans-serif" font-size="10">fast, approximate</text>
  <text x="310" y="171" text-anchor="start" fill="#666" font-family="sans-serif" font-size="10">slow, exact</text>

  <!-- Speed arrow on right -->
  <line x1="360" y1="50" x2="360" y2="155" stroke="#babbbd" stroke-width="1.5"/>
  <polygon points="360,45 356,53 364,53" fill="#babbbd"/>
  <polygon points="360,160 356,152 364,152" fill="#babbbd"/>
</svg>
