- number: 1
  title: "CT for ML"
  leader: bungert
  co-leader: guy
  description: "The advent of the control theoretic perspective on learning with deep residual neural networks has
recently been shown to be not only a reliable computational tool, but also a fruitful avenue for
providing original theoretical results to a multitude of problems. These include adversarial
robustness, generative modelling and generalisation bounds, to name a few. Similarly, dynamic
Bayesian networks, which are the central paradigm in statistical ML, can be analysed with the help of
classical CT tools like Kalman filters. The aim is to explore these connections and contribute to the
mathematics of reliable ML."
  tasks:
    - "Obtaining error estimates for ML surrogates"
    - "Theoretical guarantees for physics-informed neural networks"
    - "Application of Game Theory to ML"
    - "Kalman filters in statistical ML"
    - "Analysis of high-dimensional deep neural networks and transformers using CT tools"
- number: 2
  title: "ML for CT"
  leader: kleikamp
  co-leader: periago
  description: "This working group addresses the application of ML tools, such as kernel methods and deep neural networks
to complex models in control theory. These will be combined with traditional control methods, either on
the algorithmic level for developing enhanced and provably efficient novel techniques, or for analysis
purposes, in order to better understand the opportunities and limitations of ML for the control design.
The focus will be on the development of techniques that can handle high-dimensional problems and
face the curse of dimensionality."
  tasks:
    - "Addressing the curse of dimensionality with ML tools"
    - "Solving parameterised optimal control problems"
    - "Construction of control Lyapunov functions using ML methods"
    - "Developing ML-based approaches for the for the life-cycle-optimisation in materials"
    - "Exploiting PINNs for solving complex free boundary problems"
  open-problems:
    - topic: "Addressing the curse of dimensionality with ML tools"
      problems:
      - title: "Learn set-valued maps related to control problems with machine learning tools"
        contact: periago
        skills: "Good command of Python and a basic knowledge of control theory"
      - title: "Regularity theory for PDEs in high dimensions"
        contact: periago
        skills: "Good command of functional analysis and PDEs"
    - topic: "Solving parameterised optimal control problems"
      problems:
      - title: "Nonlinear and transport-dominated problems"
        contact: lazar
        skills: "Good command in numerics of PDEs and in control theory"
        goal: 'Solve optimal control problems where the governing dynamics are parametric and nonlinear or transport-dominated, for instance $$\frac{\partial y}{\partial t}+\mu\frac{\partial y^2}{\partial x}=u.$$'
        details: "<ul><li>Nonlinear problems pose difficulties for traditional, linear approximation schemes.</li>
                      <li>General question for model order reduction.</li>
                      <li>What is possible in the context of (optimal) control of such systems?</li>
                      <li>Where can machine learning help to overcome these issues (nonlinear strategies such as autoencoders, etc.)?</li></ul>"
      - title: "Control of flow problems such as the Navier-Stokes equations"
        contact: '<a href="mailto:maria.strazzullo@polito.it" class="link">Maria Strazzullo</a>'
        skills: "Good command in numerics of PDEs and in control theory"
        goal: 'Solve optimal control problems for flows governed by parametric Navier-Stokes equations, for instance $$\begin{aligned}\frac{\partial y}{\partial t} - \mu\Delta y + (y\cdot\nabla)y + \nabla p &= u,\\\operatorname{div} y &= 0.\end{aligned}$$'
        details: '<ul><li>Navier-Stokes equations are an important model for (viscous) flow in real-world applications.</li><li>Depending on the Reynolds number (roughly the parameter $\mu$ in the formulation above), the solution behavior can change completely.</li><li>Can machine learning help in order to deal with the turbulent regime?</li></ul>'
      - title: "General convex objective functionals"
        contact: molinari
        skills: "Good command in (convex) optimization; Python programming"
        goal: 'Induce sparsity in the control by solving a problem of the form $$u^*_\mu = \arg\min\limits_{u\in G}\ \lVert u\rVert_{L^1([0,T];U)}+\frac{\alpha}{2}\lVert u\rVert_{L^2([0,T];U)}^2 + h(x_\mu).$$'
        details: "<ul><li>Which algorithm is suited best to solve this OCP?</li><li>How to deal with the parameter dependence?</li><li>Can reduced order modeling be applied here in a suitable manner?</li><li>If so, how to combine it in a reasonable way with machine learning?</li></ul>"
      - title: "Optimization in the parameter space"
        contact: kleikamp
        skills: "Knowledge in optimization and control theory; Python programming"
        goal: 'Solve problems of the form $$\mu^* = \arg\min\limits_{\mu\in\mathcal{P}}\ F(\mu;u_\mu)$$ where $u_\mu\in G$ solves an optimal control problem for the parameter $\mu\in\mathcal{P}$.'
        details: '<ul><li>Optimal control problem for a fixed parameter as an "inner" problem.</li><li>Derivatives with respect to the parameter are typically required.</li><li>Optimizer usually moves outside of the range of training data points. $\longrightarrow$ How to extrapolate properly?</li></ul>'
      - title: "Small data regime"
        contact: kleikamp
        skills: "Good command of machine learning and control theory"
        goal: "How to deal with relatively small amount of available data?"
        details: '<ul><li>Training data (at least using the FOM) is costly to obtain.</li><li>Which quantities are easiest to learn when only a small amount of data is available?<ul><li>Optimal control $\longrightarrow$ How to obtain performance guarantees?</li><li>Reduced quantities $\longrightarrow$ Combination with MOR techniques often allows to collect more training data and to make use of their error estimates.</li><li>Open loop vs. closed loop systems $\longrightarrow$ Feedback control requires different architectures and learning techniques.</li></ul></li></ul>'
      - title: "Applications in uncertainty quantification"
        contact: kleikamp
        skills: "Machine learning and surrogate modeling; a bit of probability theory and statistics; Python programming"
        goal: 'Make use of the derived surrogates in <em>multilevel Monte Carlo methods</em>: $$\mathbb{E}[M_L] = \mathbb{E}[M_0] + \sum\limits_{\ell=0}^{L} \mathbb{E}[M_\ell-M_{\ell-1}].$$'
        details: "<ul><li>Consider different applications in which we want efficient estimates of unknown quantities.</li><li>Interactions of the different models?</li><li>Strategies to select the models and the number of evaluations on different levels?</li><li>Can we derive probabilistic guarantees that this works?</li></ul>"
    - topic: "Construction of control Lyapunov functions using ML methods"
      problems:
      - title: "Fast and reliable learning algorithms (in particular for nonsmooth functions)"
        contact: gruene
      - title: "Efficient verification of a control Lyapunov function candidate"
        contact: gruene
    - topic: "Developing ML-based approaches for the life-cycle-optimisation in materials"
      problems:
      - title: "Approximating solutions to the elasticity system"
        contact: '<a href="mailto:p.kogut@i.ua" class="link">Peter Kogut</a>'
        goal: "Develop the concept of approximating solutions to the elasticity system with damage evolution."
      - title: "Existence and uniqueness of weak solutions I"
        contact: '<a href="mailto:p.kogut@i.ua" class="link">Peter Kogut</a>'
        goal: 'Establish the existence and uniqueness of the weak solutions via approximation for the $L^1$-damage source function $$\phi(\mathbf{e}(\mathbf{u}),\zeta) = -\lambda_D\left(\frac{1-\zeta}{\zeta}\right)-\frac{1}{2}\lambda_u\mathbf{e}(\mathbf{u})\cdot\mathbf{e}(\mathbf{u})+\lambda_w.$$'
      - title: "Existence and uniqueness of weak solutions II"
        contact: '<a href="mailto:p.kogut@i.ua" class="link">Peter Kogut</a>'
        goal: 'Study the existence of weak solutions to the original problem using the following relaxed version $$-\operatorname{div}(\zeta A\mathbf{e}(\mathbf{u}))+\varepsilon\mathbf{u}=\mathbf{f}\qquad\text{in }\Omega_T.$$'
      - title: "Investigating the strain tensor"
        contact: '<a href="mailto:p.kogut@i.ua" class="link">Peter Kogut</a>'
        goal: 'Find out whether the strain tensor $\mathbf{e}(\mathbf{u})=\{\mathbf{e}_{ij}/\mathbf{u}\}$ with $$\mathbf{e}_{ij}(\mathbf{u}) = \frac{1}{2}\left(\frac{\partial u_i}{\partial x_j}+\frac{\partial u_j}{\partial x_i}\right),\qquad\forall i,j=1,\dots,N$$ possesses the high integrability property, $|\mathbf{e}(\mathbf{u})|\in L^{2(1+\delta)}$ for some $\delta>0$.'
      - title: "Existence of an optimal control"
        contact: '<a href="mailto:p.kogut@i.ua" class="link">Peter Kogut</a>'
        goal: 'Establish the existence of an optimal control provided the damage source function takes the form $$\phi(\mathbf{e}(\mathbf{u}),\zeta) = -\lambda_D\left(\frac{1-\zeta}{\zeta}\right)-\frac{1}{2}\lambda_u\mathbf{e}(\mathbf{u})\cdot\mathbf{e}(\mathbf{u})+\lambda_w.$$'
      - title: "Controls in the limit of vanishing smoothing"
        contact: '<a href="mailto:p.kogut@i.ua" class="link">Peter Kogut</a>'
        goal: 'Find out whether sustainable controls can be attained in the limit as $\varepsilon\to0$ using the following relaxed version of the first equation $$-\operatorname{div}((\zeta)_\varepsilon A\mathbf{e}(\mathbf{u}))=\mathbf{f}\qquad\text{in }\Omega_T,$$ where $(\cdot)_\varepsilon$ stands for the Steklov smoothing operator.'
      - title: "Existence of a control"
        contact: '<a href="mailto:p.kogut@i.ua" class="link">Peter Kogut</a>'
        goal: 'It is unknown whether there exists a control $f\in\mathcal{F}_{ad}$ such that the corresponding solutions $(\zeta,\mathbf{u})$ satisfy the equations $$\begin{aligned}-\operatorname{div}(\zeta A\mathbf{e}(\mathbf{u})) &= \mathbf{f},\\\zeta''-\kappa\Delta\zeta &= \phi(\mathbf{e}(\mathbf{u}),\zeta)\end{aligned}$$ in the sense of $L^2(Q_T)$.'
    - topic: "Exploiting PINNs for solving complex free boundary problems"
      problems:
      - title: "Error estimates for PINNs"
        contact: trombetti
        goal: "Find error estimates for PINNs for more complex problems, elliptic problems like for instance Bernoulli, or even evolutionary PDEs."
      - title: "PINNs containing domain information"
        contact: trombetti
        goal: "Work out a new type of PINNs where the neural network provides not only the function (solution to the PDE) but also information on the domain."
- number: 3
  title: "Hybrid and Data-driven modelling"
  leader: flasskamp
  co-leader: gruene
  description: "The aim is to address control problems built on observed pairs of input-output data. The Action will
develop efficient and reliable methods for designing controllers when the underlying model is
unidentified or when the underlying laws and processes only allow partial knowledge. While these topics
arise in a wide range of potential applications, the Action will focus on control of power systems (solar,
wind, smart houses) and construction of digital twins in healthcare and personalised medicine. In
connection with industry partners, the Action will explore implementation options that can provide
benefits for clean energy and improve healthcare outcomes of European citizens."
  tasks:
    - "Approximating the (control to) state law from data"
    - "Constructive methods for extremum seeking control"
    - "Control of energy systems"
    - "Digital twins for personalised medicine"
- number: 4
  title: "Transformational activities"
  leader: jacimovic
  co-leader: dede
  description: "WG4 will be responsible for transforming theoretical results into software solutions and practical
implementations in industry and society. Its activities are essential for bridging the gap between theory
and real-world applications, ultimately ensuring the relevance and accessibility of the findings to the
broader community. Special attention will be given the following activities: <ul><li>creating an open-source
repository hosting solutions related to the theoretical advances from WG1-WG3;</li><li>development of
comprehensive documentation and training materials (tutorials, case studies, etc);</li><li>establishing
partnership with industry to promote the adoption of these solutions and validate their applicability.</li></ul>"
  tasks:
    - "Identify possible real-world applications of the results gained in WG1-WG3 in collaboration with
industrial partners."
    - "Establish a public repository for data, coding and programs (on GitHub or a similar platform) in
accordance with the FAIR data principles."
    - "Develop comprehensive documentation and training materials (tutorials, case studies, etc)."
    - "Identify and pursue funding opportunities that facilitate collaborations between scientists and
industry stakeholders."
    - "Organise on-site events linking companies, software developers and researchers (at least two
such events per the Action lifetime)."
- number: 5
  title: "Sharing & spreading"
  leader: caldarelli
  co-leader: molinari
  description: "The aim of WG5 is to provide communication channels that will allow for efficient and timely transfer of
knowledge among Action members and towards a wider audience. In particular, to produce a dynamic
overview of the progress achieved and the current state of the art (the results, developed codes, open
problems, industrial perspectives) that will be immediately available to the other WGs, and later to all
the interested researchers. Special attention will be paid to the problems of fragmentation of
communities interested in CT, ML and their applications. This WG will help to tackle the challenge that
the same or closely related problems/methods are known by different communities under different
names, and cross-references are not clearly established."
  tasks:
    - "Develop an online platform for sharing the results and ideas of the researchers involved in the
Action, both within and beyond the Action."
    - "Provide a forum for discussion and communication to be used by all Action members."
    - "Launch and run on a regular basis an (online) seminar of the Action."
    - "Provide a list of open problems that will be offered to Master and Ph.D. students, and to Young
Researchers and Innovators participating in the network."
    - "Establish a platform offering industry related internships to Master and Ph.D. students."
    - "Disseminate results via social media."
    - "Organise participation in popular science activities at local, national and international level
(public lectures, Open Doors events, European Researchers Night, Science festivals, etc.)."
