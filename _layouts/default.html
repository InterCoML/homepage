<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-GB" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta charset="utf-8">
    <link rel="shortcut icon" href="{{ site.baseUrl }}/assets/images/favicon.ico" />
    <title>{{ site.actionAbbreviation }} - {{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseUrl }}/assets/css/main.css">
    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({tex2jax: {inlineMath: [['$','$'], ['\\(','\\)']]}});
    </script>
    <script type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-AMS-MML_HTMLorMML">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    {% if page.leaflet %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
    {% endif %}
  </head>

  <body>
    {% include desktop-menu.html %}
    <div id="container" class="content container wrapper">
      {{ content }}
    </div>
    {% include footer.html %}
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var targets = document.querySelectorAll(".card, .sub-container > h1, .sub-container > h2, .tab-content, .accordion");
        targets.forEach(function (el) { el.classList.add("fade-in"); });

        // Wait for the hidden state to be painted before observing
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            var observer = new IntersectionObserver(function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  entry.target.classList.add("visible");
                  observer.unobserve(entry.target);
                }
              });
            }, { threshold: 0.1 });

            targets.forEach(function (el) { observer.observe(el); });
          });
        });
      });
    </script>
  </body>
</html>
